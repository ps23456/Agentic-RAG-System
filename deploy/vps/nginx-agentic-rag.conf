server {
    listen 80;
    listen [::]:80;
    server_name _;

    # PDF / large uploads hit Nginx before the backend; default is ~1 MB and causes 413.
    client_max_body_size 100m;

    # Frontend build output (Vite build).
    root /var/www/agentic-rag/frontend/dist;
    # Omit `index index.html` here — with SPA `try_files ... /index.html` it can cause an
    # internal redirect cycle (nginx error: redirection cycle → 500).

    # Streaming endpoints should not be buffered.
    location = /query {
        proxy_pass http://127.0.0.1:7000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:7000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # Optional backend docs/openapi passthrough.
    location /docs {
        proxy_pass http://127.0.0.1:7000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:7000;
        proxy_set_header Host $host;
    }

    # Frontend SPA fallback (omit trailing `$uri/` if you ever see redirect cycles).
    location / {
        try_files $uri /index.html;
    }
}
